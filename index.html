<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalash EXIM — Mission Control</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0c10;
    --bg-card: #12151c;
    --bg-card-hover: #181c26;
    --bg-elevated: #1a1f2b;
    --border: #1e2330;
    --border-active: #2a3040;
    --text-primary: #e8eaf0;
    --text-secondary: #8890a0;
    --text-muted: #555e70;
    --accent-gold: #d4a853;
    --accent-gold-dim: #a68430;
    --accent-green: #34d399;
    --accent-green-dim: rgba(52,211,153,0.12);
    --accent-red: #f87171;
    --accent-red-dim: rgba(248,113,113,0.12);
    --accent-blue: #60a5fa;
    --accent-blue-dim: rgba(96,165,250,0.12);
    --accent-amber: #fbbf24;
    --accent-amber-dim: rgba(251,191,36,0.12);
    --accent-purple: #a78bfa;
    --accent-purple-dim: rgba(167,139,250,0.12);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', -apple-system, sans-serif;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ────────────────────────── */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(212,168,83,0.04) 0%, transparent 100%);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo-mark {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-dim) 100%);
    border-radius: 8px;
    display: grid; place-items: center;
    font-family: var(--mono);
    font-weight: 700; font-size: 16px;
    color: var(--bg-primary);
    letter-spacing: -1px;
  }
  .header-title { font-weight: 700; font-size: 18px; letter-spacing: -0.3px; }
  .header-subtitle { font-size: 12px; color: var(--text-muted); font-family: var(--mono); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .status-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px;
    font-size: 12px; font-family: var(--mono);
    background: var(--accent-green-dim);
    color: var(--accent-green);
    border: 1px solid rgba(52,211,153,0.2);
  }
  .status-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent-green);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .refresh-btn {
    background: var(--bg-card);
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s;
  }
  .refresh-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); border-color: var(--border-active); }
  .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

  /* ── MAIN LAYOUT ───────────────────── */
  .main { padding: 24px 28px; max-width: 1440px; margin: 0 auto; }

  /* ── KPI ROW ───────────────────────── */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .kpi {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    transition: border-color 0.2s;
  }
  .kpi:hover { border-color: var(--border-active); }
  .kpi-label {
    font-size: 11px; font-family: var(--mono);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 8px;
  }
  .kpi-value {
    font-size: 28px; font-weight: 700;
    letter-spacing: -1px;
    font-family: var(--mono);
    line-height: 1;
  }
  .kpi-sub {
    font-size: 12px; color: var(--text-muted);
    margin-top: 6px;
    font-family: var(--mono);
  }

  /* ── SECTION LAYOUT ────────────────── */
  .grid-2col {
    display: grid;
    grid-template-columns: 1fr 380px;
    gap: 20px;
    margin-bottom: 24px;
  }
  @media (max-width: 960px) {
    .grid-2col { grid-template-columns: 1fr; }
  }

  /* ── CARDS ─────────────────────────── */
  .card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .card-title {
    font-size: 13px; font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.6px;
    color: var(--text-secondary);
  }
  .card-badge {
    font-size: 11px; font-family: var(--mono);
    padding: 3px 8px; border-radius: 4px;
  }
  .card-body { padding: 16px 20px; }

  /* ── PRODUCT TABLE ─────────────────── */
  .product-row {
    display: grid;
    grid-template-columns: 44px 1fr 70px 80px 100px;
    gap: 12px;
    align-items: center;
    padding: 14px 0;
    border-bottom: 1px solid var(--border);
    transition: background 0.15s;
  }
  .product-row:last-child { border-bottom: none; }
  .product-row:hover { background: rgba(255,255,255,0.015); margin: 0 -20px; padding: 14px 20px; }
  .tvs-circle {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: grid; place-items: center;
    font-family: var(--mono);
    font-weight: 700; font-size: 14px;
    border: 2px solid;
  }
  .tvs-investigate { border-color: var(--accent-green); color: var(--accent-green); background: var(--accent-green-dim); }
  .tvs-review { border-color: var(--accent-blue); color: var(--accent-blue); background: var(--accent-blue-dim); }
  .tvs-watchlist { border-color: var(--accent-amber); color: var(--accent-amber); background: var(--accent-amber-dim); }
  .tvs-parked { border-color: var(--text-muted); color: var(--text-muted); background: rgba(85,94,112,0.1); }

  .product-name {
    font-size: 13px; font-weight: 600;
    line-height: 1.3;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .product-hs {
    font-size: 11px; font-family: var(--mono);
    color: var(--text-muted);
    margin-top: 2px;
  }
  .margin-tag {
    font-family: var(--mono);
    font-size: 13px; font-weight: 600;
  }
  .margin-positive { color: var(--accent-green); }
  .margin-negative { color: var(--accent-red); }
  .margin-na { color: var(--text-muted); }

  .stage-tag {
    font-size: 11px; font-family: var(--mono);
    padding: 4px 8px; border-radius: 4px;
    text-align: center;
    white-space: nowrap;
  }
  .stage-approval_queue { background: var(--accent-green-dim); color: var(--accent-green); }
  .stage-parked { background: rgba(85,94,112,0.15); color: var(--text-muted); }
  .stage-approved { background: var(--accent-blue-dim); color: var(--accent-blue); }
  .stage-sourcing { background: var(--accent-purple-dim); color: var(--accent-purple); }

  .band-label {
    font-size: 10px; font-family: var(--mono);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* ── ACTIVITY FEED ─────────────────── */
  .activity-item {
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .activity-item:last-child { border-bottom: none; }
  .activity-agent {
    font-size: 11px; font-family: var(--mono);
    color: var(--accent-gold);
    margin-bottom: 4px;
  }
  .activity-text {
    font-size: 12.5px; color: var(--text-secondary);
    line-height: 1.5;
  }
  .activity-time {
    font-size: 10px; font-family: var(--mono);
    color: var(--text-muted);
    margin-top: 4px;
  }

  /* ── EXPANDED SCORECARD ────────────── */
  .scorecard-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 100;
    display: grid; place-items: center;
    padding: 20px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s;
  }
  .scorecard-overlay.active { opacity: 1; pointer-events: all; }
  .scorecard-panel {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 14px;
    width: 100%;
    max-width: 700px;
    max-height: 85vh;
    overflow-y: auto;
    padding: 28px;
  }
  .scorecard-panel::-webkit-scrollbar { width: 6px; }
  .scorecard-panel::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 3px; }
  .sc-close {
    float: right; background: none; border: 1px solid var(--border);
    color: var(--text-secondary); width: 32px; height: 32px;
    border-radius: 8px; cursor: pointer; font-size: 16px;
    transition: all 0.15s;
  }
  .sc-close:hover { background: var(--bg-elevated); color: var(--text-primary); }
  .sc-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; padding-right: 40px; }
  .sc-hs { font-family: var(--mono); font-size: 13px; color: var(--accent-gold); margin-bottom: 20px; }
  .sc-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 10px;
    margin-bottom: 20px;
  }
  .sc-metric {
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    padding: 12px;
    text-align: center;
  }
  .sc-metric-value {
    font-family: var(--mono);
    font-size: 22px; font-weight: 700;
  }
  .sc-metric-label {
    font-size: 10px; font-family: var(--mono);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-top: 4px;
  }
  .sc-reasoning {
    background: var(--bg-elevated);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .sc-reasoning-title {
    font-size: 11px; font-family: var(--mono);
    color: var(--accent-gold);
    text-transform: uppercase;
    letter-spacing: 0.6px;
    margin-bottom: 6px;
  }
  .sc-reasoning-text {
    font-size: 12.5px;
    color: var(--text-secondary);
    line-height: 1.6;
  }

  /* ── TOP OPPORTUNITIES ─────────────── */
  .opp-row {
    display: grid;
    grid-template-columns: 1fr 100px 80px 80px;
    gap: 10px;
    align-items: center;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
    font-size: 12.5px;
  }
  .opp-row:last-child { border-bottom: none; }
  .opp-desc { color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .opp-val { font-family: var(--mono); color: var(--text-primary); text-align: right; }
  .opp-cagr { font-family: var(--mono); text-align: right; }
  .opp-trend { font-family: var(--mono); font-size: 11px; text-align: center; }
  .trend-acc { color: var(--accent-green); }
  .trend-dec { color: var(--accent-red); }
  .trend-stab { color: var(--accent-amber); }

  /* ── TABLE HEADER ──────────────────── */
  .tbl-header {
    font-size: 10px; font-family: var(--mono);
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }

  /* ── TABS ───────────────────────────── */
  .tab-row {
    display: flex; gap: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 20px;
  }
  .tab-btn {
    background: none; border: none;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 12px;
    padding: 12px 16px;
    cursor: pointer;
    border-bottom: 2px solid transparent;
    transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text-secondary); }
  .tab-btn.active { color: var(--accent-gold); border-bottom-color: var(--accent-gold); }

  /* ── LOADING ────────────────────────── */
  .loading-state {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 13px;
  }
  .loading-spinner {
    display: inline-block;
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent-gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 10px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── FOOTER ─────────────────────────── */
  .footer {
    text-align: center;
    padding: 20px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--text-muted);
    border-top: 1px solid var(--border);
    margin-top: 40px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
const h = React.createElement;
const { useState, useEffect, useCallback, useMemo } = React;

// ── Supabase Config ──
const SUPABASE_URL = 'https://lsfrglrrxpenrdelivlf.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzZnJnbHJyeHBlbnJkZWxpdmxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDUyODEsImV4cCI6MjA4ODk4MTI4MX0.aIrU6_PFRGIWHLgh_Zq7jOmBXl7N8NZ99xzk_drgE3E';

async function sbFetch(table, params = '') {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, {
    headers: {
      'apikey': SUPABASE_ANON,
      'Authorization': `Bearer ${SUPABASE_ANON}`,
      'Accept': 'application/json'
    }
  });
  if (!res.ok) throw new Error(`Supabase ${table}: ${res.status}`);
  return res.json();
}

// ── Helper ──
function timeAgo(ts) {
  if (!ts) return '';
  const diff = Date.now() - new Date(ts).getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return `${hrs}h ago`;
  return `${Math.floor(hrs / 24)}d ago`;
}

function fmtUsd(val) {
  if (!val) return '—';
  const n = parseFloat(val);
  if (n >= 1e9) return `$${(n/1e9).toFixed(1)}B`;
  if (n >= 1e6) return `$${(n/1e6).toFixed(0)}M`;
  if (n >= 1e3) return `$${(n/1e3).toFixed(0)}K`;
  return `$${n.toFixed(0)}`;
}

function fmtInr(val) {
  if (!val) return '—';
  const n = parseFloat(val);
  if (n >= 1e7) return `₹${(n/1e7).toFixed(1)}Cr`;
  if (n >= 1e5) return `₹${(n/1e5).toFixed(1)}L`;
  if (n >= 1e3) return `₹${(n/1e3).toFixed(1)}K`;
  return `₹${n.toFixed(0)}`;
}

// ── Components ──
function Spinner() {
  return h('div', { className: 'loading-state' },
    h('div', { className: 'loading-spinner' }),
    h('div', null, 'Loading from Supabase...')
  );
}

function KpiRow({ products, activity, tradeCount }) {
  const inQueue = products.filter(p => p.stage === 'approval_queue').length;
  const parked = products.filter(p => p.stage === 'parked').length;
  const approved = products.filter(p => p.stage === 'approved').length;
  const bestMargin = products.reduce((max, p) => {
    const m = parseFloat(p.gross_margin_pct);
    return (!isNaN(m) && m > max) ? m : max;
  }, 0);
  const avgTvs = products.length > 0
    ? Math.round(products.reduce((s,p) => s + (p.tvs_score || 0), 0) / products.length)
    : 0;

  const kpis = [
    { label: 'Products Scored', value: products.length, sub: `${inQueue} queued · ${parked} parked` },
    { label: 'In Approval Queue', value: inQueue, sub: `Ready for Jay Bhai review`, color: 'var(--accent-green)' },
    { label: 'Best Margin Found', value: bestMargin > 0 ? `${bestMargin.toFixed(0)}%` : '—', sub: 'Gross margin %', color: bestMargin >= 30 ? 'var(--accent-green)' : 'var(--accent-amber)' },
    { label: 'Avg TVS Score', value: avgTvs, sub: `Across ${products.length} products`, color: avgTvs >= 60 ? 'var(--accent-green)' : 'var(--accent-amber)' },
    { label: 'Trade Records', value: tradeCount.toLocaleString(), sub: '8-digit HS · 6yr India-CN' },
    { label: 'Agent Actions', value: activity.length, sub: activity.length > 0 ? `Latest: ${timeAgo(activity[0]?.created_at)}` : '—' },
  ];

  return h('div', { className: 'kpi-row' },
    kpis.map((k, i) =>
      h('div', { className: 'kpi', key: i },
        h('div', { className: 'kpi-label' }, k.label),
        h('div', { className: 'kpi-value', style: k.color ? { color: k.color } : {} }, k.value),
        h('div', { className: 'kpi-sub' }, k.sub)
      )
    )
  );
}

function ProductRow({ product, onClick }) {
  const bandClass = `tvs-${product.tvs_band || 'parked'}`;
  const stageClass = `stage-${product.stage}`;
  const margin = parseFloat(product.gross_margin_pct);
  const marginClass = isNaN(margin) ? 'margin-na' : (margin >= 0 ? 'margin-positive' : 'margin-negative');
  const marginText = isNaN(margin) ? '—' : `${margin.toFixed(0)}%`;

  const stageLabel = {
    'approval_queue': '⏳ Queue',
    'parked': '🅿️ Parked',
    'approved': '✅ Approved',
    'sourcing': '🔍 Sourcing',
  }[product.stage] || product.stage;

  return h('div', { className: 'product-row', onClick, style: { cursor: 'pointer' } },
    h('div', { className: `tvs-circle ${bandClass}` }, product.tvs_score || '—'),
    h('div', null,
      h('div', { className: 'product-name', title: product.product_name }, product.product_name),
      h('div', { className: 'product-hs' }, `HS ${product.hs_code}`)
    ),
    h('div', { className: `margin-tag ${marginClass}` }, marginText),
    h('div', null, h('span', { className: `stage-tag ${stageClass}` }, stageLabel)),
    h('div', { className: 'band-label', style: { color: `var(--accent-${product.tvs_band === 'investigate' ? 'green' : product.tvs_band === 'review' ? 'blue' : product.tvs_band === 'watchlist' ? 'amber' : 'text-muted'})` } },
      fmtUsd(product.annual_import_value_usd)
    )
  );
}

function Scorecard({ product, onClose }) {
  if (!product) return null;

  const metrics = [
    { label: 'Margin', val: product.tvs_margin, max: 20, reasoning: product.tvs_margin_reasoning },
    { label: 'Scale', val: product.tvs_scalability, max: 10, reasoning: product.tvs_scalability_reasoning },
    { label: 'Reorder', val: product.tvs_reorder_freq, max: 15, reasoning: product.tvs_reorder_reasoning },
    { label: 'Sticky', val: product.tvs_stickiness, max: 5, reasoning: product.tvs_stickiness_reasoning },
    { label: 'Buyers', val: product.tvs_buyer_reach, max: 10, reasoning: product.tvs_buyer_reach_reasoning },
    { label: 'Compete', val: product.tvs_competition, max: 5, reasoning: product.tvs_competition_reasoning },
    { label: 'Regulatory', val: product.tvs_regulatory, max: 10, reasoning: product.tvs_regulatory_reasoning },
    { label: 'Capital', val: product.tvs_capital_efficiency, max: 10, reasoning: product.tvs_capital_reasoning },
    { label: 'Logistics', val: product.tvs_logistics, max: 5, reasoning: product.tvs_logistics_reasoning },
    { label: 'Value Add', val: product.tvs_value_add, max: 5, reasoning: product.tvs_value_add_reasoning },
    { label: 'Growth', val: product.tvs_growth, max: 5, reasoning: product.tvs_growth_reasoning },
  ];

  function metricColor(val, max) {
    const pct = max > 0 ? val / max : 0;
    if (pct >= 0.7) return 'var(--accent-green)';
    if (pct >= 0.4) return 'var(--accent-amber)';
    return 'var(--accent-red)';
  }

  return h('div', { className: 'scorecard-overlay active', onClick: (e) => { if (e.target === e.currentTarget) onClose(); } },
    h('div', { className: 'scorecard-panel' },
      h('button', { className: 'sc-close', onClick: onClose }, '✕'),
      h('div', { className: 'sc-title' }, product.product_name),
      h('div', { className: 'sc-hs' }, `HS ${product.hs_code} · TVS ${product.tvs_score}/100 · ${(product.tvs_band || '').toUpperCase()}`),

      // Key financials
      h('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: '10px', marginBottom: '20px' } },
        h('div', { className: 'sc-metric' },
          h('div', { className: 'sc-metric-value', style: { color: 'var(--accent-green)' } }, product.gross_margin_pct ? `${parseFloat(product.gross_margin_pct).toFixed(0)}%` : '—'),
          h('div', { className: 'sc-metric-label' }, 'Margin')
        ),
        h('div', { className: 'sc-metric' },
          h('div', { className: 'sc-metric-value' }, fmtInr(product.total_landed_cost_inr)),
          h('div', { className: 'sc-metric-label' }, 'Landed Cost')
        ),
        h('div', { className: 'sc-metric' },
          h('div', { className: 'sc-metric-value' }, fmtInr(product.market_price_inr)),
          h('div', { className: 'sc-metric-label' }, 'Market Price')
        ),
        h('div', { className: 'sc-metric' },
          h('div', { className: 'sc-metric-value' }, fmtUsd(product.annual_import_value_usd)),
          h('div', { className: 'sc-metric-label' }, 'Import Value')
        )
      ),

      // TVS breakdown
      h('div', { className: 'sc-grid' },
        metrics.map((m, i) =>
          h('div', { className: 'sc-metric', key: i },
            h('div', { className: 'sc-metric-value', style: { color: metricColor(m.val || 0, m.max), fontSize: '18px' } },
              `${m.val ?? 0}/${m.max}`
            ),
            h('div', { className: 'sc-metric-label' }, m.label)
          )
        )
      ),

      // Reasoning blocks
      metrics.filter(m => m.reasoning).map((m, i) =>
        h('div', { className: 'sc-reasoning', key: i },
          h('div', { className: 'sc-reasoning-title' }, `${m.label} Reasoning`),
          h('div', { className: 'sc-reasoning-text' }, m.reasoning)
        )
      ),

      // Regulatory & notes
      product.regulatory_notes && h('div', { className: 'sc-reasoning' },
        h('div', { className: 'sc-reasoning-title' }, 'Regulatory Notes'),
        h('div', { className: 'sc-reasoning-text' }, product.regulatory_notes)
      ),
      product.anti_dumping_notes && h('div', { className: 'sc-reasoning' },
        h('div', { className: 'sc-reasoning-title' }, 'Anti-Dumping Notes'),
        h('div', { className: 'sc-reasoning-text' }, product.anti_dumping_notes)
      ),
      product.value_add_notes && h('div', { className: 'sc-reasoning' },
        h('div', { className: 'sc-reasoning-title' }, 'Value-Add (DTF/Creative Graphics)'),
        h('div', { className: 'sc-reasoning-text' }, product.value_add_notes)
      ),
      product.rejection_reason && h('div', { className: 'sc-reasoning', style: { borderLeft: '3px solid var(--accent-red)' } },
        h('div', { className: 'sc-reasoning-title', style: { color: 'var(--accent-red)' } }, 'Rejection / Park Reason'),
        h('div', { className: 'sc-reasoning-text' }, product.rejection_reason)
      )
    )
  );
}

function ActivityFeed({ activity }) {
  return h('div', null,
    activity.slice(0, 15).map((a, i) =>
      h('div', { className: 'activity-item', key: i },
        h('div', { className: 'activity-agent' },
          `${a.agent} → ${a.action}`,
          a.hs_code ? ` [${a.hs_code}]` : ''
        ),
        h('div', { className: 'activity-text' },
          (a.reasoning || '').length > 180
            ? (a.reasoning || '').slice(0, 180) + '…'
            : a.reasoning
        ),
        h('div', { className: 'activity-time' }, timeAgo(a.created_at))
      )
    )
  );
}

function OpportunitiesTable({ opportunities }) {
  return h('div', null,
    h('div', { className: 'opp-row tbl-header' },
      h('div', null, 'Description'),
      h('div', { style: { textAlign: 'right' } }, 'Import $'),
      h('div', { style: { textAlign: 'right' } }, 'CAGR'),
      h('div', { style: { textAlign: 'center' } }, 'Trend')
    ),
    opportunities.slice(0, 20).map((o, i) =>
      h('div', { className: 'opp-row', key: i },
        h('div', { className: 'opp-desc', title: `${o.hs_code} - ${o.description}` },
          h('span', { style: { color: 'var(--accent-gold)', fontFamily: 'var(--mono)', fontSize: '11px' } }, `${o.hs_code} `),
          o.description
        ),
        h('div', { className: 'opp-val' }, fmtUsd(parseFloat(o.import_value_usd) * 1e6)),
        h('div', { className: `opp-cagr ${parseFloat(o.cagr_5yr) > 20 ? 'trend-acc' : ''}` },
          parseFloat(o.cagr_5yr) >= 999 ? '∞' : `${parseFloat(o.cagr_5yr).toFixed(0)}%`
        ),
        h('div', { className: `opp-trend trend-${o.trend_direction === 'accelerating' ? 'acc' : o.trend_direction === 'decelerating' ? 'dec' : 'stab'}` },
          o.trend_direction === 'accelerating' ? '▲ ACC' : o.trend_direction === 'decelerating' ? '▼ DEC' : '— FLAT'
        )
      )
    )
  );
}

// ── Main App ──
function App() {
  const [products, setProducts] = useState([]);
  const [activity, setActivity] = useState([]);
  const [opportunities, setOpportunities] = useState([]);
  const [tradeCount, setTradeCount] = useState(0);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [selectedProduct, setSelectedProduct] = useState(null);
  const [productTab, setProductTab] = useState('all');
  const [refreshing, setRefreshing] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);

  const loadData = useCallback(async () => {
    try {
      const [prods, acts, opps, countRes] = await Promise.all([
        sbFetch('products', '?order=tvs_score.desc'),
        sbFetch('recent_activity', '?order=created_at.desc&limit=20'),
        sbFetch('untapped_opportunities', '?order=import_value_usd.desc&limit=30'),
        sbFetch('trade_data', '?select=hs_code&limit=1', ).catch(() => []),
      ]);
      setProducts(prods);
      setActivity(acts);
      setOpportunities(opps);
      // We know it's 8965 from the schema
      setTradeCount(8965);
      setLastRefresh(new Date());
      setError(null);
    } catch (err) {
      setError(err.message);
      console.error('Load error:', err);
    } finally {
      setLoading(false);
      setRefreshing(false);
    }
  }, []);

  useEffect(() => { loadData(); }, [loadData]);

  // Auto-refresh every 30s
  useEffect(() => {
    const interval = setInterval(() => { loadData(); }, 30000);
    return () => clearInterval(interval);
  }, [loadData]);

  const handleRefresh = () => {
    setRefreshing(true);
    loadData();
  };

  const filteredProducts = useMemo(() => {
    if (productTab === 'all') return products;
    if (productTab === 'queue') return products.filter(p => p.stage === 'approval_queue');
    if (productTab === 'parked') return products.filter(p => p.stage === 'parked');
    return products;
  }, [products, productTab]);

  if (loading) {
    return h('div', null,
      h('div', { className: 'header' },
        h('div', { className: 'header-left' },
          h('div', { className: 'logo-mark' }, 'KE'),
          h('div', null,
            h('div', { className: 'header-title' }, 'Kalash EXIM'),
            h('div', { className: 'header-subtitle' }, 'B2B Import Research · Mission Control')
          )
        )
      ),
      h('div', { className: 'main' }, h(Spinner))
    );
  }

  return h('div', null,
    // Header
    h('div', { className: 'header' },
      h('div', { className: 'header-left' },
        h('div', { className: 'logo-mark' }, 'KE'),
        h('div', null,
          h('div', { className: 'header-title' }, 'Kalash EXIM'),
          h('div', { className: 'header-subtitle' }, 'B2B Import Research · Mission Control')
        )
      ),
      h('div', { className: 'header-right' },
        h('div', { className: 'status-pill' },
          h('div', { className: 'status-dot' }),
          'DAWN ACTIVE'
        ),
        lastRefresh && h('span', { style: { fontSize: '11px', fontFamily: 'var(--mono)', color: 'var(--text-muted)' } },
          `Updated ${timeAgo(lastRefresh)}`
        ),
        h('button', { className: `refresh-btn ${refreshing ? 'loading' : ''}`, onClick: handleRefresh },
          refreshing ? '⟳ ...' : '⟳ Refresh'
        )
      )
    ),

    h('div', { className: 'main' },
      // Error banner
      error && h('div', { style: { background: 'var(--accent-red-dim)', border: '1px solid rgba(248,113,113,0.3)', borderRadius: 'var(--radius)', padding: '12px 16px', marginBottom: '20px', fontFamily: 'var(--mono)', fontSize: '12px', color: 'var(--accent-red)' } },
        `⚠ ${error}`
      ),

      // KPIs
      h(KpiRow, { products, activity, tradeCount }),

      // Main Grid
      h('div', { className: 'grid-2col' },
        // LEFT: Products
        h('div', { className: 'card' },
          h('div', { className: 'tab-row' },
            ['all', 'queue', 'parked'].map(tab =>
              h('button', {
                key: tab,
                className: `tab-btn ${productTab === tab ? 'active' : ''}`,
                onClick: () => setProductTab(tab)
              }, tab === 'all' ? `All (${products.length})` : tab === 'queue' ? `Queue (${products.filter(p=>p.stage==='approval_queue').length})` : `Parked (${products.filter(p=>p.stage==='parked').length})`)
            )
          ),
          h('div', { className: 'card-body' },
            h('div', { className: 'product-row tbl-header', style: { paddingTop: 0 } },
              h('div', null, 'TVS'),
              h('div', null, 'Product'),
              h('div', null, 'Margin'),
              h('div', null, 'Stage'),
              h('div', null, 'Import $')
            ),
            filteredProducts.length === 0
              ? h('div', { style: { padding: '30px 0', textAlign: 'center', color: 'var(--text-muted)', fontFamily: 'var(--mono)', fontSize: '12px' } }, 'No products in this view')
              : filteredProducts.map(p =>
                  h(ProductRow, {
                    key: p.id,
                    product: p,
                    onClick: () => setSelectedProduct(p)
                  })
                )
          )
        ),

        // RIGHT: Activity
        h('div', { className: 'card' },
          h('div', { className: 'card-header' },
            h('div', { className: 'card-title' }, 'Agent Activity'),
            h('div', { className: 'card-badge', style: { background: 'var(--accent-gold-dim)', color: 'var(--accent-gold)' } },
              `${activity.length} actions`
            )
          ),
          h('div', { className: 'card-body', style: { maxHeight: '600px', overflowY: 'auto' } },
            activity.length === 0
              ? h('div', { className: 'loading-state' }, 'No agent activity yet')
              : h(ActivityFeed, { activity })
          )
        )
      ),

      // Untapped Opportunities
      h('div', { className: 'card', style: { marginBottom: '24px' } },
        h('div', { className: 'card-header' },
          h('div', { className: 'card-title' }, 'Untapped Opportunities · Trade Data'),
          h('div', { className: 'card-badge', style: { background: 'var(--accent-purple-dim)', color: 'var(--accent-purple)' } },
            `${opportunities.length}+ HS codes unscored`
          )
        ),
        h('div', { className: 'card-body' },
          opportunities.length === 0
            ? h('div', { className: 'loading-state' }, 'No untapped opportunities found')
            : h(OpportunitiesTable, { opportunities })
        )
      ),

      // Footer
      h('div', { className: 'footer' },
        'Kalash EXIM Mission Control · Supabase ↔ Dawn Agent Squad · Est. 1978 Kamothe, Navi Mumbai'
      )
    ),

    // Scorecard Overlay
    h(Scorecard, { product: selectedProduct, onClose: () => setSelectedProduct(null) })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
