<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kalash EXIM — Mission Control v3</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg-primary: #0a0c10;
    --bg-card: #12151c;
    --bg-card-hover: #181c26;
    --bg-elevated: #1a1f2b;
    --border: #1e2330;
    --border-active: #2a3040;
    --text-primary: #e8eaf0;
    --text-secondary: #8890a0;
    --text-muted: #555e70;
    --accent-gold: #d4a853;
    --accent-gold-dim: #a68430;
    --accent-green: #34d399;
    --accent-green-dim: rgba(52,211,153,0.12);
    --accent-red: #f87171;
    --accent-red-dim: rgba(248,113,113,0.12);
    --accent-blue: #60a5fa;
    --accent-blue-dim: rgba(96,165,250,0.12);
    --accent-amber: #fbbf24;
    --accent-amber-dim: rgba(251,191,36,0.12);
    --accent-purple: #a78bfa;
    --accent-purple-dim: rgba(167,139,250,0.12);
    --accent-cyan: #22d3ee;
    --accent-cyan-dim: rgba(34,211,238,0.12);
    --mono: 'JetBrains Mono', monospace;
    --sans: 'DM Sans', -apple-system, sans-serif;
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    font-family: var(--sans);
    background: var(--bg-primary);
    color: var(--text-primary);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 28px;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(212,168,83,0.04) 0%, transparent 100%);
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo-mark {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent-gold) 0%, var(--accent-gold-dim) 100%);
    border-radius: 8px; display: grid; place-items: center;
    font-family: var(--mono); font-weight: 700; font-size: 16px;
    color: var(--bg-primary); letter-spacing: -1px;
  }
  .header-title { font-weight: 700; font-size: 18px; letter-spacing: -0.3px; }
  .header-subtitle { font-size: 12px; color: var(--text-muted); font-family: var(--mono); margin-top: 2px; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .status-pill {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 12px; border-radius: 20px;
    font-size: 12px; font-family: var(--mono);
    background: var(--accent-green-dim); color: var(--accent-green);
    border: 1px solid rgba(52,211,153,0.2);
  }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-green); animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .refresh-btn {
    background: var(--bg-card); border: 1px solid var(--border);
    color: var(--text-secondary); padding: 6px 14px;
    border-radius: var(--radius-sm); font-family: var(--mono); font-size: 12px;
    cursor: pointer; transition: all 0.15s;
  }
  .refresh-btn:hover { background: var(--bg-card-hover); color: var(--text-primary); }

  .main { padding: 24px 28px; max-width: 1440px; margin: 0 auto; }

  /* Pipeline Progress */
  .pipeline-bar {
    display: flex; gap: 2px; margin-bottom: 24px;
    background: var(--bg-card); border-radius: var(--radius); padding: 4px;
    border: 1px solid var(--border);
  }
  .pipeline-seg {
    flex: 1; text-align: center; padding: 10px 8px;
    font-family: var(--mono); font-size: 11px;
    border-radius: 6px; transition: all 0.2s;
  }
  .pipeline-seg .seg-count { font-size: 20px; font-weight: 700; display: block; line-height: 1; margin-bottom: 2px; }
  .pipeline-seg .seg-label { text-transform: uppercase; letter-spacing: 0.8px; opacity: 0.8; }

  /* KPI Row */
  .kpi-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 14px; margin-bottom: 24px; }
  .kpi {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 16px 18px; transition: border-color 0.2s;
  }
  .kpi:hover { border-color: var(--border-active); }
  .kpi-label { font-size: 10px; font-family: var(--mono); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px; }
  .kpi-value { font-size: 26px; font-weight: 700; letter-spacing: -1px; font-family: var(--mono); line-height: 1; }
  .kpi-sub { font-size: 11px; color: var(--text-muted); margin-top: 4px; font-family: var(--mono); }

  /* Grid */
  .grid-2col { display: grid; grid-template-columns: 1fr 360px; gap: 20px; margin-bottom: 24px; }
  @media (max-width: 960px) { .grid-2col { grid-template-columns: 1fr; } }

  /* Cards */
  .card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .card-header { display: flex; align-items: center; justify-content: space-between; padding: 14px 18px; border-bottom: 1px solid var(--border); }
  .card-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.6px; color: var(--text-secondary); }
  .card-badge { font-size: 10px; font-family: var(--mono); padding: 3px 8px; border-radius: 4px; }
  .card-body { padding: 14px 18px; }

  /* Tabs */
  .tab-row { display: flex; gap: 0; border-bottom: 1px solid var(--border); padding: 0 18px; }
  .tab-btn {
    background: none; border: none; color: var(--text-muted); font-family: var(--mono); font-size: 11px;
    padding: 10px 14px; cursor: pointer; border-bottom: 2px solid transparent; transition: all 0.15s;
  }
  .tab-btn:hover { color: var(--text-secondary); }
  .tab-btn.active { color: var(--accent-gold); border-bottom-color: var(--accent-gold); }

  /* Product Table */
  .product-row {
    display: grid;
    grid-template-columns: 42px 1fr 60px 70px 70px 70px 60px;
    gap: 8px; align-items: center;
    padding: 12px 0; border-bottom: 1px solid var(--border);
    transition: background 0.15s; cursor: pointer;
  }
  .product-row:last-child { border-bottom: none; }
  .product-row:hover { background: rgba(255,255,255,0.015); margin: 0 -18px; padding: 12px 18px; }
  .product-row.tbl-header { cursor: default; font-size: 10px; font-family: var(--mono); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; padding-bottom: 8px; }
  .product-row.tbl-header:hover { background: none; margin: 0; padding-bottom: 8px; }

  .tvs-circle {
    width: 42px; height: 42px; border-radius: 50%;
    display: grid; place-items: center;
    font-family: var(--mono); font-weight: 700; font-size: 13px; border: 2px solid;
  }
  .tvs-high { border-color: var(--accent-green); color: var(--accent-green); background: var(--accent-green-dim); }
  .tvs-mid { border-color: var(--accent-blue); color: var(--accent-blue); background: var(--accent-blue-dim); }
  .tvs-low { border-color: var(--accent-amber); color: var(--accent-amber); background: var(--accent-amber-dim); }
  .tvs-dead { border-color: var(--text-muted); color: var(--text-muted); background: rgba(85,94,112,0.1); }

  .product-name { font-size: 12.5px; font-weight: 600; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .product-hs { font-size: 10px; font-family: var(--mono); color: var(--text-muted); margin-top: 1px; }

  .margin-tag { font-family: var(--mono); font-size: 12px; font-weight: 600; }
  .margin-positive { color: var(--accent-green); }
  .margin-negative { color: var(--accent-red); }

  .stage-tag { font-size: 10px; font-family: var(--mono); padding: 3px 6px; border-radius: 4px; text-align: center; white-space: nowrap; }
  .stage-approval_queue { background: var(--accent-green-dim); color: var(--accent-green); }
  .stage-qa_review { background: var(--accent-cyan-dim); color: var(--accent-cyan); }
  .stage-qa_failed { background: var(--accent-red-dim); color: var(--accent-red); }
  .stage-watchlist { background: var(--accent-amber-dim); color: var(--accent-amber); }
  .stage-parked { background: rgba(85,94,112,0.15); color: var(--text-muted); }
  .stage-approved { background: var(--accent-blue-dim); color: var(--accent-blue); }
  .stage-data_incomplete { background: var(--accent-amber-dim); color: var(--accent-amber); }

  .trend-tag { font-size: 10px; font-family: var(--mono); font-weight: 600; }
  .trend-acc { color: var(--accent-green); }
  .trend-dec { color: var(--accent-red); }
  .trend-stab { color: var(--accent-amber); }
  .trend-null { color: var(--text-muted); }

  .grade-tag { font-family: var(--mono); font-size: 11px; font-weight: 700; }
  .grade-A { color: var(--accent-green); }
  .grade-B { color: var(--accent-blue); }
  .grade-C { color: var(--accent-amber); }
  .grade-D, .grade-F { color: var(--accent-red); }

  /* Activity Feed */
  .activity-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .activity-item:last-child { border-bottom: none; }
  .activity-agent { font-size: 10px; font-family: var(--mono); color: var(--accent-gold); margin-bottom: 3px; }
  .activity-text { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }
  .activity-time { font-size: 10px; font-family: var(--mono); color: var(--text-muted); margin-top: 3px; }

  /* Scorecard Overlay */
  .scorecard-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px); z-index: 100;
    display: grid; place-items: center; padding: 20px;
    opacity: 0; pointer-events: none; transition: opacity 0.2s;
  }
  .scorecard-overlay.active { opacity: 1; pointer-events: all; }
  .scorecard-panel {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 14px; width: 100%; max-width: 800px;
    max-height: 85vh; overflow-y: auto; padding: 28px;
  }
  .scorecard-panel::-webkit-scrollbar { width: 6px; }
  .scorecard-panel::-webkit-scrollbar-thumb { background: var(--border-active); border-radius: 3px; }
  .sc-close { float: right; background: none; border: 1px solid var(--border); color: var(--text-secondary); width: 32px; height: 32px; border-radius: 8px; cursor: pointer; font-size: 16px; transition: all 0.15s; }
  .sc-close:hover { background: var(--bg-elevated); color: var(--text-primary); }
  .sc-title { font-size: 18px; font-weight: 700; margin-bottom: 4px; padding-right: 40px; }
  .sc-hs { font-family: var(--mono); font-size: 12px; color: var(--accent-gold); margin-bottom: 16px; }
  .sc-fin-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 16px; }
  .sc-metric { background: var(--bg-elevated); border-radius: var(--radius-sm); padding: 10px; text-align: center; }
  .sc-metric-value { font-family: var(--mono); font-size: 18px; font-weight: 700; }
  .sc-metric-label { font-size: 9px; font-family: var(--mono); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 3px; }
  .sc-tvs-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 8px; margin-bottom: 16px; }
  .sc-reasoning { background: var(--bg-elevated); border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 8px; }
  .sc-reasoning-title { font-size: 10px; font-family: var(--mono); color: var(--accent-gold); text-transform: uppercase; letter-spacing: 0.6px; margin-bottom: 4px; }
  .sc-reasoning-text { font-size: 12px; color: var(--text-secondary); line-height: 1.5; }

  /* Scorecard tabs */
  .sc-tab-row { display: flex; gap: 0; border-bottom: 1px solid var(--border); margin-bottom: 16px; }
  .sc-tab-btn { background: none; border: none; color: var(--text-muted); font-family: var(--mono); font-size: 11px; padding: 8px 14px; cursor: pointer; border-bottom: 2px solid transparent; }
  .sc-tab-btn:hover { color: var(--text-secondary); }
  .sc-tab-btn.active { color: var(--accent-gold); border-bottom-color: var(--accent-gold); }

  /* Evidence list in scorecard */
  .ev-row { display: grid; grid-template-columns: 80px 1fr 60px; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 11px; align-items: center; }
  .ev-row:last-child { border-bottom: none; }
  .ev-type { font-family: var(--mono); color: var(--accent-gold); font-size: 10px; text-transform: uppercase; }
  .ev-url { color: var(--accent-blue); text-decoration: none; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .ev-url:hover { text-decoration: underline; }
  .ev-conf { font-family: var(--mono); font-size: 10px; text-align: right; }

  /* QA list in scorecard */
  .qa-row { padding: 10px 0; border-bottom: 1px solid var(--border); }
  .qa-row:last-child { border-bottom: none; }
  .qa-verdict { font-family: var(--mono); font-size: 11px; font-weight: 700; margin-bottom: 4px; }
  .qa-verdict.pass { color: var(--accent-green); }
  .qa-verdict.fail { color: var(--accent-red); }
  .qa-issues { font-size: 11px; color: var(--text-secondary); line-height: 1.5; }

  /* Opportunities Table */
  .opp-row { display: grid; grid-template-columns: 1fr 80px 60px 60px; gap: 8px; align-items: center; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
  .opp-row:last-child { border-bottom: none; }
  .opp-row.tbl-header { font-size: 10px; font-family: var(--mono); color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.8px; padding-bottom: 6px; }
  .opp-desc { color: var(--text-secondary); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .opp-val { font-family: var(--mono); color: var(--text-primary); text-align: right; }
  .opp-cagr { font-family: var(--mono); text-align: right; }

  /* Sidebar Evidence/QA feed items */
  .side-ev-item { padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
  .side-ev-item:last-child { border-bottom: none; }
  .side-ev-type { font-family: var(--mono); font-size: 10px; color: var(--accent-gold); text-transform: uppercase; }
  .side-ev-claim { color: var(--text-secondary); margin-top: 2px; line-height: 1.4; }
  .side-ev-hs { font-family: var(--mono); font-size: 10px; color: var(--text-muted); margin-top: 2px; }

  .side-qa-item { padding: 8px 0; border-bottom: 1px solid var(--border); }
  .side-qa-item:last-child { border-bottom: none; }
  .side-qa-head { font-family: var(--mono); font-size: 11px; font-weight: 600; margin-bottom: 3px; }
  .side-qa-issue { font-size: 11px; color: var(--text-secondary); line-height: 1.4; }

  /* Loading */
  .loading-state { text-align: center; padding: 40px; color: var(--text-muted); font-family: var(--mono); font-size: 13px; }
  .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent-gold); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .footer { text-align: center; padding: 20px; font-size: 11px; font-family: var(--mono); color: var(--text-muted); border-top: 1px solid var(--border); margin-top: 40px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const h = React.createElement;
const { useState, useEffect, useCallback, useMemo } = React;

const SUPABASE_URL = 'https://lsfrglrrxpenrdelivlf.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzZnJnbHJyeHBlbnJkZWxpdmxmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM0MDUyODEsImV4cCI6MjA4ODk4MTI4MX0.aIrU6_PFRGIWHLgh_Zq7jOmBXl7N8NZ99xzk_drgE3E';

async function sb(table, params='') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${table}${params}`, {
    headers: { 'apikey': SUPABASE_ANON, 'Authorization': `Bearer ${SUPABASE_ANON}`, 'Accept': 'application/json' }
  });
  if (!r.ok) throw new Error(`${table}: ${r.status}`);
  return r.json();
}

function timeAgo(ts) {
  if (!ts) return '';
  const m = Math.floor((Date.now() - new Date(ts).getTime()) / 60000);
  if (m < 1) return 'now'; if (m < 60) return m+'m'; const h = Math.floor(m/60);
  if (h < 24) return h+'h'; return Math.floor(h/24)+'d';
}
function fmtUsd(v) { if (!v) return '—'; const n=parseFloat(v); if (n>=1e9) return '$'+(n/1e9).toFixed(1)+'B'; if (n>=1e6) return '$'+(n/1e6).toFixed(0)+'M'; if (n>=1e3) return '$'+(n/1e3).toFixed(0)+'K'; return '$'+n.toFixed(0); }
function fmtInr(v) { if (!v) return '—'; const n=parseFloat(v); if (n>=1e7) return '₹'+(n/1e7).toFixed(1)+'Cr'; if (n>=1e5) return '₹'+(n/1e5).toFixed(1)+'L'; if (n>=1e3) return '₹'+(n/1e3).toFixed(1)+'K'; return '₹'+n.toFixed(0); }
function tvsClass(s) { if (s >= 70) return 'tvs-high'; if (s >= 60) return 'tvs-mid'; if (s >= 40) return 'tvs-low'; return 'tvs-dead'; }
function stageLabel(s) {
  return { approval_queue:'Queue', qa_review:'QA Review', qa_failed:'QA Failed', watchlist:'Watch', parked:'Parked', approved:'Approved', data_incomplete:'Incomplete' }[s] || s;
}
function trendIcon(t) {
  if (t === 'accelerating') return { text: '▲ ACC', cls: 'trend-acc' };
  if (t === 'decelerating') return { text: '▼ DEC', cls: 'trend-dec' };
  if (t === 'stable') return { text: '— STB', cls: 'trend-stab' };
  return { text: '—', cls: 'trend-null' };
}

function PipelineBar({ products }) {
  const stages = [
    { key: 'approval_queue', label: 'Approval Queue', bg: 'var(--accent-green-dim)', color: 'var(--accent-green)' },
    { key: 'qa_review', label: 'QA Review', bg: 'var(--accent-cyan-dim)', color: 'var(--accent-cyan)' },
    { key: 'qa_failed', label: 'QA Failed', bg: 'var(--accent-red-dim)', color: 'var(--accent-red)' },
    { key: 'watchlist', label: 'Watchlist', bg: 'var(--accent-amber-dim)', color: 'var(--accent-amber)' },
    { key: 'parked', label: 'Parked', bg: 'rgba(85,94,112,0.15)', color: 'var(--text-muted)' },
  ];
  return h('div', { className: 'pipeline-bar' },
    stages.map(s => {
      const count = products.filter(p => p.stage === s.key).length;
      return h('div', { key: s.key, className: 'pipeline-seg', style: { background: count > 0 ? s.bg : 'transparent', color: count > 0 ? s.color : 'var(--text-muted)' } },
        h('span', { className: 'seg-count' }, count),
        h('span', { className: 'seg-label' }, s.label)
      );
    })
  );
}

function KpiRow({ products, evidence, qaReviews, attempts }) {
  const bestMargin = products.reduce((max, p) => { const m = parseFloat(p.gross_margin_pct); return (!isNaN(m) && m > max) ? m : max; }, 0);
  const avgTvs = products.length > 0 ? Math.round(products.reduce((s,p) => s + (p.tvs_score||0), 0) / products.length) : 0;
  const correctRate = products.filter(p => parseFloat(p.exchange_rate) >= 92).length;
  const kpis = [
    { label: 'Products', value: products.length, sub: `${correctRate} on correct rate` },
    { label: 'Best Margin', value: bestMargin > 0 ? bestMargin.toFixed(0)+'%' : '—', color: bestMargin >= 30 ? 'var(--accent-green)' : 'var(--accent-amber)' },
    { label: 'Avg TVS', value: avgTvs, color: avgTvs >= 60 ? 'var(--accent-green)' : 'var(--accent-amber)' },
    { label: 'Evidence URLs', value: evidence, color: 'var(--accent-blue)' },
    { label: 'QA Reviews', value: qaReviews, color: 'var(--accent-cyan)' },
    { label: 'Scoring Runs', value: attempts },
  ];
  return h('div', { className: 'kpi-row' },
    kpis.map((k, i) => h('div', { className: 'kpi', key: i },
      h('div', { className: 'kpi-label' }, k.label),
      h('div', { className: 'kpi-value', style: k.color ? { color: k.color } : {} }, k.value),
      k.sub && h('div', { className: 'kpi-sub' }, k.sub)
    ))
  );
}

function ProductTable({ products, onSelect, tab, setTab }) {
  const filtered = useMemo(() => {
    if (tab === 'all') return products;
    if (tab === 'queue') return products.filter(p => p.stage === 'approval_queue');
    if (tab === 'qa') return products.filter(p => p.stage === 'qa_review' || p.stage === 'qa_failed');
    if (tab === 'parked') return products.filter(p => p.stage === 'parked' || p.stage === 'watchlist');
    return products;
  }, [products, tab]);

  const queueCount = products.filter(p => p.stage === 'approval_queue').length;
  const qaCount = products.filter(p => p.stage === 'qa_review' || p.stage === 'qa_failed').length;
  const parkedCount = products.filter(p => p.stage === 'parked' || p.stage === 'watchlist').length;

  return h('div', { className: 'card' },
    h('div', { className: 'tab-row' },
      [['all', 'All ('+products.length+')'], ['queue', 'Queue ('+queueCount+')'], ['qa', 'QA ('+qaCount+')'], ['parked', 'Parked ('+parkedCount+')']].map(([k,l]) =>
        h('button', { key: k, className: 'tab-btn '+(tab===k?'active':''), onClick: () => setTab(k) }, l)
      )
    ),
    h('div', { className: 'card-body' },
      h('div', { className: 'product-row tbl-header' },
        h('div', null, 'TVS'), h('div', null, 'Product'), h('div', null, 'Margin'),
        h('div', null, 'Stage'), h('div', null, 'Trend'), h('div', null, 'Grade'), h('div', null, 'Evid')
      ),
      filtered.length === 0
        ? h('div', { style: { padding: '30px 0', textAlign: 'center', color: 'var(--text-muted)', fontFamily: 'var(--mono)', fontSize: '12px' } }, 'No products')
        : filtered.map(p => {
            const margin = parseFloat(p.gross_margin_pct);
            const trend = trendIcon(p.trend_acceleration);
            return h('div', { className: 'product-row', key: p.id || p.hs_code, onClick: () => onSelect(p) },
              h('div', null, h('div', { className: 'tvs-circle '+tvsClass(p.tvs_score) }, p.tvs_score || '—')),
              h('div', null,
                h('div', { className: 'product-name', title: p.product_name }, p.product_name),
                h('div', { className: 'product-hs' }, 'HS '+p.hs_code)
              ),
              h('div', { className: 'margin-tag '+(isNaN(margin)?'':(margin>=0?'margin-positive':'margin-negative')) },
                isNaN(margin) ? '—' : margin.toFixed(0)+'%'
              ),
              h('div', null, h('span', { className: 'stage-tag stage-'+p.stage }, stageLabel(p.stage))),
              h('div', { className: 'trend-tag '+trend.cls }, trend.text),
              h('div', { className: 'grade-tag grade-'+(p.audit_grade||'') }, p.audit_grade || '—'),
              h('div', { style: { fontFamily: 'var(--mono)', fontSize: '11px', color: (p.evidence_count||0) >= 7 ? 'var(--accent-green)' : 'var(--accent-amber)' } },
                (p.evidence_count||0)
              )
            );
          })
    )
  );
}

function Scorecard({ product: p, onClose, evidence, qaReviews }) {
  const [scTab, setScTab] = useState('tvs');
  if (!p) return null;

  const metrics = [
    { label:'Margin', val:p.tvs_margin, max:20, r:p.tvs_margin_reasoning },
    { label:'Scale', val:p.tvs_scalability, max:10, r:p.tvs_scalability_reasoning },
    { label:'Reorder', val:p.tvs_reorder_freq, max:15, r:p.tvs_reorder_reasoning },
    { label:'Sticky', val:p.tvs_stickiness, max:5, r:p.tvs_stickiness_reasoning },
    { label:'Buyers', val:p.tvs_buyer_reach, max:10, r:p.tvs_buyer_reach_reasoning },
    { label:'Compete', val:p.tvs_competition, max:10, r:p.tvs_competition_reasoning },
    { label:'Regulatory', val:p.tvs_regulatory, max:8, r:p.tvs_regulatory_reasoning },
    { label:'Capital', val:p.tvs_capital_efficiency, max:7, r:p.tvs_capital_reasoning },
    { label:'Logistics', val:p.tvs_logistics, max:5, r:p.tvs_logistics_reasoning },
    { label:'Value Add', val:p.tvs_value_add, max:5, r:p.tvs_value_add_reasoning },
    { label:'Growth', val:p.tvs_growth, max:5, r:p.tvs_growth_reasoning },
  ];
  function mc(v,m) { const pct=m>0?v/m:0; if (pct>=0.7) return 'var(--accent-green)'; if (pct>=0.4) return 'var(--accent-amber)'; return 'var(--accent-red)'; }

  const myEvidence = evidence.filter(e => e.product_id === p.id);
  const myQA = qaReviews.filter(q => q.product_id === p.id);
  const trend = trendIcon(p.trend_acceleration);

  return h('div', { className: 'scorecard-overlay active', onClick: e => { if (e.target === e.currentTarget) onClose(); } },
    h('div', { className: 'scorecard-panel' },
      h('button', { className: 'sc-close', onClick: onClose }, '✕'),
      h('div', { className: 'sc-title' }, p.product_name),
      h('div', { className: 'sc-hs' },
        'HS '+p.hs_code+' · TVS '+p.tvs_score+'/100 · ',
        h('span', { className: 'stage-tag stage-'+p.stage, style: { marginLeft: 6 } }, stageLabel(p.stage)),
        p.audit_grade && h('span', { className: 'grade-tag grade-'+p.audit_grade, style: { marginLeft: 8 } }, 'Grade '+p.audit_grade),
        h('span', { className: 'trend-tag '+trend.cls, style: { marginLeft: 8 } }, trend.text)
      ),

      // Financials
      h('div', { className: 'sc-fin-grid' },
        h('div', { className: 'sc-metric' }, h('div', { className: 'sc-metric-value', style: { color: parseFloat(p.gross_margin_pct)>=0?'var(--accent-green)':'var(--accent-red)' } }, p.gross_margin_pct ? parseFloat(p.gross_margin_pct).toFixed(0)+'%' : '—'), h('div', { className: 'sc-metric-label' }, 'Margin')),
        h('div', { className: 'sc-metric' }, h('div', { className: 'sc-metric-value' }, fmtInr(p.total_landed_cost_inr)), h('div', { className: 'sc-metric-label' }, 'Landed')),
        h('div', { className: 'sc-metric' }, h('div', { className: 'sc-metric-value' }, fmtInr(p.market_price_inr)), h('div', { className: 'sc-metric-label' }, 'Market')),
        h('div', { className: 'sc-metric' }, h('div', { className: 'sc-metric-value' }, fmtUsd(p.annual_import_value_usd)), h('div', { className: 'sc-metric-label' }, 'Import $')),
        h('div', { className: 'sc-metric' }, h('div', { className: 'sc-metric-value' }, '₹'+(parseFloat(p.exchange_rate)||0).toFixed(1)), h('div', { className: 'sc-metric-label' }, 'USD/INR'))
      ),

      // Tabs
      h('div', { className: 'sc-tab-row' },
        [['tvs','TVS Scores ('+p.tvs_score+')'], ['evidence','Evidence ('+myEvidence.length+')'], ['qa','QA Reviews ('+myQA.length+')']].map(([k,l]) =>
          h('button', { key: k, className: 'sc-tab-btn '+(scTab===k?'active':''), onClick: () => setScTab(k) }, l)
        )
      ),

      // TVS Tab
      scTab === 'tvs' && h('div', null,
        h('div', { className: 'sc-tvs-grid' },
          metrics.map((m,i) => h('div', { className: 'sc-metric', key: i },
            h('div', { className: 'sc-metric-value', style: { color: mc(m.val||0, m.max), fontSize: '16px' } }, (m.val??0)+'/'+m.max),
            h('div', { className: 'sc-metric-label' }, m.label)
          ))
        ),
        metrics.filter(m => m.r).map((m,i) => h('div', { className: 'sc-reasoning', key: i },
          h('div', { className: 'sc-reasoning-title' }, m.label),
          h('div', { className: 'sc-reasoning-text' }, m.r)
        )),
        p.regulatory_notes && h('div', { className: 'sc-reasoning' }, h('div', { className: 'sc-reasoning-title' }, 'Regulatory'), h('div', { className: 'sc-reasoning-text' }, p.regulatory_notes)),
        p.rejection_reason && h('div', { className: 'sc-reasoning', style: { borderLeft: '3px solid var(--accent-red)' } }, h('div', { className: 'sc-reasoning-title', style: { color: 'var(--accent-red)' } }, 'Park/Reject Reason'), h('div', { className: 'sc-reasoning-text' }, p.rejection_reason))
      ),

      // Evidence Tab
      scTab === 'evidence' && h('div', null,
        myEvidence.length === 0
          ? h('div', { style: { color: 'var(--text-muted)', fontFamily: 'var(--mono)', fontSize: '12px', padding: '20px 0', textAlign: 'center' } }, 'No evidence sources logged')
          : myEvidence.map((e,i) => h('div', { className: 'ev-row', key: i },
              h('div', { className: 'ev-type' }, e.source_type),
              e.source_url
                ? h('a', { className: 'ev-url', href: e.source_url, target: '_blank', rel: 'noopener' }, e.source_domain || e.source_url)
                : h('span', { style: { color: 'var(--text-secondary)', fontSize: '11px' } }, e.claim || '—'),
              h('div', { className: 'ev-conf', style: { color: e.confidence === 'high' ? 'var(--accent-green)' : e.confidence === 'low' ? 'var(--accent-red)' : 'var(--accent-amber)' } }, e.confidence || '—')
            ))
      ),

      // QA Tab
      scTab === 'qa' && h('div', null,
        myQA.length === 0
          ? h('div', { style: { color: 'var(--text-muted)', fontFamily: 'var(--mono)', fontSize: '12px', padding: '20px 0', textAlign: 'center' } }, 'No QA reviews yet')
          : myQA.map((q,i) => h('div', { className: 'qa-row', key: i },
              h('div', { className: 'qa-verdict '+(q.verdict||'') },
                (q.verdict||'').toUpperCase()+' · Cycle '+(q.review_cycle||1)+
                (q.tvs_score_adjusted ? ' · TVS adjusted: '+q.tvs_score_original+'→'+q.tvs_score_adjusted : '')
              ),
              (q.issues_found||[]).length > 0 && h('div', { className: 'qa-issues' },
                (q.issues_found||[]).map((iss,j) => h('div', { key: j, style: { padding: '2px 0' } }, '• '+iss))
              )
            ))
      )
    )
  );
}

function ActivityFeed({ activity }) {
  return h('div', null,
    activity.slice(0,15).map((a,i) => h('div', { className: 'activity-item', key: i },
      h('div', { className: 'activity-agent' }, a.agent+' → '+a.action+(a.hs_code?' ['+a.hs_code+']':'')),
      h('div', { className: 'activity-text' }, (a.reasoning||'').length > 160 ? (a.reasoning||'').slice(0,160)+'…' : a.reasoning),
      h('div', { className: 'activity-time' }, timeAgo(a.created_at)+' ago')
    ))
  );
}

function RightSidebar({ activity, evidence, qaReviews, sideTab, setSideTab }) {
  const tabCounts = { activity: activity.length, qa: qaReviews.length, evidence: evidence.length };
  return h('div', { className: 'card' },
    h('div', { className: 'tab-row' },
      [['activity','Activity ('+tabCounts.activity+')'], ['qa','QA ('+tabCounts.qa+')'], ['evidence','Evidence ('+tabCounts.evidence+')']].map(([k,l]) =>
        h('button', { key: k, className: 'tab-btn '+(sideTab===k?'active':''), onClick: () => setSideTab(k) }, l)
      )
    ),
    h('div', { className: 'card-body', style: { maxHeight: '600px', overflowY: 'auto' } },
      sideTab === 'activity' && (activity.length === 0
        ? h('div', { className: 'loading-state' }, 'No agent activity yet')
        : h(ActivityFeed, { activity })
      ),
      sideTab === 'qa' && (qaReviews.length === 0
        ? h('div', { className: 'loading-state' }, 'No QA reviews yet')
        : qaReviews.slice(0,20).map((q,i) => h('div', { className: 'side-qa-item', key: i },
            h('div', { className: 'side-qa-head', style: { color: q.verdict==='pass'?'var(--accent-green)':'var(--accent-red)' } },
              (q.verdict||'').toUpperCase()+' · HS '+(q.hs_code||'?')+' · Cycle '+(q.review_cycle||1)
            ),
            (q.issues_found||[]).length > 0
              ? h('div', { className: 'side-qa-issue' }, (q.issues_found||[]).slice(0,2).map((iss,j) => h('div', { key: j }, '• '+(iss.length > 100 ? iss.slice(0,100)+'…' : iss))))
              : h('div', { className: 'side-qa-issue', style: { color: 'var(--accent-green)' } }, 'All checks passed'),
            h('div', { style: { fontSize: '10px', fontFamily: 'var(--mono)', color: 'var(--text-muted)', marginTop: 3 } }, timeAgo(q.created_at)+' ago')
          ))
      ),
      sideTab === 'evidence' && (evidence.length === 0
        ? h('div', { className: 'loading-state' }, 'No evidence logged yet')
        : evidence.slice(0,25).map((e,i) => h('div', { className: 'side-ev-item', key: i },
            h('div', null,
              h('span', { className: 'side-ev-type' }, e.source_type),
              e.source_url && h('a', { href: e.source_url, target: '_blank', rel: 'noopener', style: { color: 'var(--accent-blue)', fontSize: '10px', marginLeft: 6, textDecoration: 'none' } }, e.source_domain || 'link')
            ),
            h('div', { className: 'side-ev-claim' }, (e.claim||'').length > 80 ? (e.claim||'').slice(0,80)+'…' : e.claim),
            h('div', { className: 'side-ev-hs' }, 'HS '+(e.hs_code||'?')+' · '+e.tvs_dimension+' · '+(e.confidence||'—'))
          ))
      )
    )
  );
}

function UntappedOpportunities({ opportunities }) {
  if (!opportunities || opportunities.length === 0) return null;
  return h('div', { className: 'card', style: { marginBottom: 24 } },
    h('div', { className: 'card-header' },
      h('div', { className: 'card-title' }, 'Untapped Opportunities · Trade Data'),
      h('div', { className: 'card-badge', style: { background: 'var(--accent-purple-dim)', color: 'var(--accent-purple)' } }, opportunities.length+'+ HS codes unscored')
    ),
    h('div', { className: 'card-body' },
      h('div', { className: 'opp-row tbl-header' },
        h('div', null, 'Description'), h('div', { style: { textAlign: 'right' } }, 'Import $'),
        h('div', { style: { textAlign: 'right' } }, 'CAGR'), h('div', { style: { textAlign: 'center' } }, 'Trend')
      ),
      opportunities.slice(0,20).map((o,i) =>
        h('div', { className: 'opp-row', key: i },
          h('div', { className: 'opp-desc', title: o.hs_code+' - '+o.description },
            h('span', { style: { color: 'var(--accent-gold)', fontFamily: 'var(--mono)', fontSize: '10px' } }, o.hs_code+' '),
            o.description
          ),
          h('div', { className: 'opp-val' }, fmtUsd(parseFloat(o.import_value_usd) * 1e6)),
          h('div', { className: 'opp-cagr', style: { color: parseFloat(o.cagr_5yr) > 20 ? 'var(--accent-green)' : 'var(--text-secondary)' } },
            parseFloat(o.cagr_5yr) >= 999 ? '∞' : parseFloat(o.cagr_5yr).toFixed(0)+'%'
          ),
          h('div', { className: 'trend-tag '+(o.trend_direction==='accelerating'?'trend-acc':o.trend_direction==='decelerating'?'trend-dec':'trend-stab'), style: { textAlign: 'center', fontSize: '10px' } },
            o.trend_direction==='accelerating'?'▲ ACC':o.trend_direction==='decelerating'?'▼ DEC':'— FLAT'
          )
        )
      )
    )
  );
}

function App() {
  const [products, setProducts] = useState([]);
  const [activity, setActivity] = useState([]);
  const [evidence, setEvidence] = useState([]);
  const [qaReviews, setQaReviews] = useState([]);
  const [counts, setCounts] = useState({ evidence: 0, qa: 0, attempts: 0 });
  const [opportunities, setOpportunities] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [selected, setSelected] = useState(null);
  const [tab, setTab] = useState('all');
  const [sideTab, setSideTab] = useState('activity');
  const [refreshing, setRefreshing] = useState(false);
  const [lastRefresh, setLastRefresh] = useState(null);

  const loadData = useCallback(async () => {
    try {
      const [prods, acts, evid, qar, opps] = await Promise.all([
        sb('products', '?select=*&order=tvs_score.desc'),
        sb('activity_log', '?order=created_at.desc&limit=20'),
        sb('evidence_sources', '?select=id,product_id,hs_code,source_type,source_url,source_domain,claim,confidence,tvs_dimension&order=created_at.desc'),
        sb('qa_reviews', '?select=*&order=created_at.desc'),
        sb('untapped_opportunities', '?order=import_value_usd.desc&limit=30').catch(() => []),
      ]);
      // Get counts
      const evCount = evid.length;
      const qaCount = qar.length;
      const attRes = await sb('scoring_attempts', '?select=id').catch(() => []);

      // Add evidence_count to products
      const evByProd = {};
      evid.forEach(e => { evByProd[e.product_id] = (evByProd[e.product_id]||0)+1; });
      prods.forEach(p => { p.evidence_count = evByProd[p.id] || 0; });

      setProducts(prods);
      setActivity(acts);
      setEvidence(evid);
      setQaReviews(qar);
      setOpportunities(opps);
      setCounts({ evidence: evCount, qa: qaCount, attempts: attRes.length });
      setLastRefresh(new Date());
      setError(null);
    } catch (err) { setError(err.message); }
    finally { setLoading(false); setRefreshing(false); }
  }, []);

  useEffect(() => { loadData(); }, [loadData]);
  useEffect(() => { const iv = setInterval(loadData, 30000); return () => clearInterval(iv); }, [loadData]);

  if (loading) return h('div', null,
    h('div', { className: 'header' }, h('div', { className: 'header-left' }, h('div', { className: 'logo-mark' }, 'KE'), h('div', null, h('div', { className: 'header-title' }, 'Kalash EXIM'), h('div', { className: 'header-subtitle' }, 'Mission Control v3')))),
    h('div', { className: 'main' }, h('div', { className: 'loading-state' }, h('div', { className: 'loading-spinner' }), h('div', null, 'Loading from Supabase...')))
  );

  return h('div', null,
    h('div', { className: 'header' },
      h('div', { className: 'header-left' }, h('div', { className: 'logo-mark' }, 'KE'), h('div', null, h('div', { className: 'header-title' }, 'Kalash EXIM'), h('div', { className: 'header-subtitle' }, 'B2B Import Research · Mission Control v3'))),
      h('div', { className: 'header-right' },
        h('div', { className: 'status-pill' }, h('div', { className: 'status-dot' }), 'DAWN ACTIVE'),
        lastRefresh && h('span', { style: { fontSize: '10px', fontFamily: 'var(--mono)', color: 'var(--text-muted)' } }, timeAgo(lastRefresh)+' ago'),
        h('button', { className: 'refresh-btn', onClick: () => { setRefreshing(true); loadData(); } }, refreshing ? '↻ ...' : '↻ Refresh')
      )
    ),
    h('div', { className: 'main' },
      error && h('div', { style: { background: 'var(--accent-red-dim)', border: '1px solid rgba(248,113,113,0.3)', borderRadius: 'var(--radius)', padding: '10px 14px', marginBottom: '16px', fontFamily: 'var(--mono)', fontSize: '11px', color: 'var(--accent-red)' } }, '⚠ '+error),
      h(PipelineBar, { products }),
      h(KpiRow, { products, evidence: counts.evidence, qaReviews: counts.qa, attempts: counts.attempts }),
      h('div', { className: 'grid-2col' },
        h(ProductTable, { products, onSelect: setSelected, tab, setTab }),
        h(RightSidebar, { activity, evidence, qaReviews, sideTab, setSideTab })
      ),
      h(UntappedOpportunities, { opportunities }),
      h('div', { className: 'footer' }, 'Kalash EXIM Mission Control v3 · Supabase ↔ Dawn Agent Squad · Est. 1978 Kamothe, Navi Mumbai')
    ),
    h(Scorecard, { product: selected, onClose: () => setSelected(null), evidence, qaReviews })
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
